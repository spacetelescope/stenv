    needs: [build]
    uses: spacetelescope/crds/.github/workflows/cache.yml@main
  test_crds:
    needs: [build, crds_test_cache]
    env:
      CRDS_PATH: /tmp/crds-cache-default-test
      CRDS_TEST_ROOT: /tmp
      CRDS_TESTING_CACHE: /tmp/crds-cache-test
      CRDS_SERVER_URL: https://hst-crds.stsci.edu
