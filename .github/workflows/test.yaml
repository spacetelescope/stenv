name: tests

on:
  pull_request:
    paths:
      - .github/workflows/*
      - environment.yaml
      - tests/*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -leo pipefail {0}

env:
  PYSYN_CDBS: https://ssb.stsci.edu/trds
  jref: https://ssb.stsci.edu/trds_open/jref
  lref: https://ssb.stsci.edu/cdbs/lref
  CRDS_PATH: /tmp/crds_cache
  CRDS_CLIENT_RETRY_COUNT: 3
  CRDS_CLIENT_RETRY_DELAY_SECONDS: 20
  LD_LIBRARY_PATH: /usr/local/lib

jobs:
  build:
    uses: ./.github/workflows/build.yaml
  crds-contexts:
    uses: spacetelescope/crds/.github/workflows/contexts.yml@main
  test_acstools:
    needs: [build]
    strategy:
      matrix:
        package: [acstools]
        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [spacetelescope/acstools]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./stenv/
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: stenv-${{ runner.os }}-py${{ matrix.python-version }}
          environment-file: ./stenv/environment.yaml
          condarc: |
            use_uv: true
          create-args: >-
            python=${{ matrix.python-version }}
          cache-environment: true
          cache-environment-key: environment-${{ matrix.python-version }}-${{ needs.build.outputs.date }}
          init-shell: bash
          generate-run-shell: false
          post-cleanup: none
      - run: echo "version=$(uv pip list | awk '$1 == "${{ matrix.package }}" {print $2}')" >> $GITHUB_OUTPUT
        id: package_version
      - run: uv pip install ${{ matrix.package }}[test]==${{ steps.package_version.outputs.version }} pytest-xdist
      - run: pytest --pyargs ${{ matrix.package }} --slow -n auto
  test_asdf:
    needs: [build]
    strategy:
      matrix:
        package: [asdf]
        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [asdf-format/asdf]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./stenv/
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: stenv-${{ runner.os }}-py${{ matrix.python-version }}
          environment-file: ./stenv/environment.yaml
          condarc: |
            use_uv: true
          create-args: >-
            python=${{ matrix.python-version }}
          cache-environment: true
          cache-environment-key: environment-${{ matrix.python-version }}-${{ needs.build.outputs.date }}
          init-shell: bash
          generate-run-shell: false
          post-cleanup: none
      - run: echo "version=$(uv pip list | awk '$1 == "${{ matrix.package }}" {print $2}')" >> $GITHUB_OUTPUT
        id: package_version
      - run: uv pip install ${{ matrix.package }}[test]==${{ steps.package_version.outputs.version }} "stdatamodels>=5" pytest-xdist
      - run: pytest --pyargs ${{ matrix.package }} --durations=10 -n auto
  test_calcos:
    needs: [build, crds-contexts]
    env:
      CRDS_OBSERVATORY: hst
      CRDS_SERVER_URL: https://hst-crds.stsci.edu
      CRDS_CONTEXT: ${{ needs.crds-contexts.outputs.hst }}
    strategy:
      matrix:
        package: [calcos]
        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [spacetelescope/calcos]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CRDS_PATH }}
          key: crds-${{ env.CRDS_OBSERVATORY }}-${{ env.CRDS_CONTEXT }}
          restore-keys: |
            crds-${{ env.CRDS_OBSERVATORY }}-
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./stenv/
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: stenv-${{ runner.os }}-py${{ matrix.python-version }}
          environment-file: ./stenv/environment.yaml
          condarc: |
            use_uv: true
          create-args: >-
            python=${{ matrix.python-version }}
          cache-environment: true
          cache-environment-key: environment-${{ matrix.python-version }}-${{ needs.build.outputs.date }}
          init-shell: bash
          generate-run-shell: false
          post-cleanup: none
      - run: echo "version=$(uv pip list | awk '$1 == "${{ matrix.package }}" {print $2}')" >> $GITHUB_OUTPUT
        id: package_version
        # TODO: figure out a better way to use package version when checking out a Git ref
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./${{ matrix.package }}/
          repository: ${{ matrix.repository }}
          ref: ${{ steps.package_version.outputs.version }}
          fetch-depth: 0
      - run: uv pip install .[test] pytest-xdist
        working-directory: ./${{ matrix.package }}/
      - run: calcos la8n01qkq_rawtag_a.fits
        working-directory: ./${{ matrix.package }}/
      - run: pytest --slow -n auto
        working-directory: ./${{ matrix.package }}/
  test_ccdproc:
    needs: [build]
    env:
      SETUP_XVFB: True
    strategy:
      matrix:
        package: [ccdproc]
        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [astropy/ccdproc]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./stenv/
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
