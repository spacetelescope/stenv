      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./${{ matrix.package }}/
          repository: ${{ matrix.repository }}
          ref: ${{ steps.package_version.outputs.version }}
          fetch-depth: 0
      - run: micromamba install -y filelock requests
      - run: uv pip install parsely roman-datamodels git+https://github.com/spacetelescope/jwst
      - run: uv pip uninstall crds && ./install && uv pip install .[submission,test,docs,synphot]
