    strategy:
      matrix:
        package: [crds]
        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [spacetelescope/crds]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ needs.crds_test_cache.outputs.path }}
            ${{ needs.crds_test_cache.outputs.testing_cache }}
          key: ${{ needs.crds_test_cache.outputs.key }}
          restore-keys: |
