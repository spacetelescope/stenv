        runs-on: ${{ fromJSON(needs.build.outputs.runs-on) }}
        python-version: ${{ fromJSON(needs.build.outputs.python-version) }}
        repository: [spacetelescope/synphot_refactor]
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.package }} (${{ matrix.runs-on }}, py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./stenv/
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: stenv-${{ runner.os }}-py${{ matrix.python-version }}
          environment-file: ./stenv/environment.yaml
          condarc: |
            use_uv: true
          create-args: >-
            python=${{ matrix.python-version }}
          cache-environment: true
          cache-environment-key: environment-${{ matrix.python-version }}-${{ needs.build.outputs.date }}
          init-shell: bash
          generate-run-shell: false
          post-cleanup: none
      - run: echo "version=$(uv pip list | awk '$1 == "${{ matrix.package }}" {print $2}')" >> $GITHUB_OUTPUT
        id: package_version
      - run: uv pip install ${{ matrix.package }}[test]==${{ steps.package_version.outputs.version }} pytest-xdist
      - run: pytest --pyargs ${{ matrix.package }} --remote-data -n auto
